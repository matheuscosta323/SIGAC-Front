<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAC - Analisar Atividade</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="dashboard-body">

    <main class="content">
        <header class="top-bar">
            <h1>Análise de Protocolo</h1>
            <p>Protocolo: <span style="color: #c19a6b;">#2026-001</span></p>
        </header>

        <section class="main-table" style="max-width: 800px;">
            <form id="formAnalise">
                <div class="field-group">
                    <label>Aluno</label>
                    <input type="text" value="Matheus Silva" disabled>
                </div>

                <div class="field-group">
                    <label>Tipo de Atividade</label>
                    <select id="tipoAtividade" style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #e2e8f0;">
                        <option value="curso">Curso de Extensão</option>
                        <option value="palestra">Palestra/Evento</option>
                        <option value="monitoria">Monitoria</option>
                    </select>
                </div>

                <div class="field-group">
                    <label>Horas Solicitadas</label>
                    <input type="number" value="20" id="horas">
                </div>

                <div style="display: flex; gap: 20px; margin-top: 30px;">
                    <button type="button" class="btn-analisar" style="background: #22c55e; flex: 1;">Aprovar</button>
                    <button type="button" class="btn-analisar" style="background: #ef4444; flex: 1;">Reprovar</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
