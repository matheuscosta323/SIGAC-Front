<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAC - Cadastrar Curso</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>

<body class="dashboard-body">
    <main class="content">
        <header class="top-bar">
            <h1>Cadastrar Novo Curso</h1>
            <p>Preencha os dados abaixo para registrar um novo curso.</p>
        </header>

        <section class="main-table" style="max-width: 700px; margin-top: 20px;">
            <form id="formCadastroCurso">

                <div class="field-group">
                    <label for="nomeCurso">Nome do Curso</label>
                    <input
                        type="text"
                        id="nomeCurso"
                        placeholder="Ex: Design Gráfico"
                        required
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;"
                    >
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">

                    <div class="field-group">
                        <label for="cargaHoraria">Carga Horária (Horas)</label>
                        <input
                            type="number"
                            id="cargaHoraria"
                            placeholder="2000"
                            required
                            style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;"
                        >
                    </div>

                    <div class="field-group">
                        <label for="modalidade">Modalidade</label>
                        <select
                            id="modalidade"
                            required
                            style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;"
                        >
                            <option value="">Selecione</option>
                            <option value="Presencial">Presencial</option>
                            <option value="EAD">EAD</option>
                            <option value="Híbrido">Híbrido</option>
                        </select>
                    </div>

                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button
                        type="submit"
                        class="btn-access"
                        style="flex: 2; margin: 0;"
                    >
                        <i class="fa-solid fa-floppy-disk"></i> Salvar Curso
                    </button>

                    <button
                        type="button"
                        class="btn-analisar"
                        onclick="history.back()"
                        style="flex: 1; background: #64748b;"
                    >
                        Cancelar
                    </button>
                </div>

            </form>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
