<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAC - Alunos</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="alunos.css">
    <link rel="stylesheet" href="validacao.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
</head>

<body class="dashboard-body">
    <main class="content">
        <div class="header-container">
            <h1>Gestão de Alunos</h1>
            <p>Acompanhamento de horas complementares</p>

            <div class="action-bar">
                <button class="btn-outline">
                    Exportar
                </button>

                <button class="btn-outline">
                    <i class="fa-solid fa-filter"></i> Filtros
                </button>

                <!-- botão visível para admin e coordenador -->
                <button
                    class="btn-access"
                    onclick="window.location.href='cadastrar-aluno.html'"
                    style="width: auto; margin: 0;"
                >
                    <i class="fa-solid fa-plus" style="color: #ffffff;"></i>
                    Novo Aluno
                </button>
            </div>
        </div>

        <div class="table-card">
            <table class="students-table">
                <thead>
                    <tr>
                        <th>ALUNO</th>
                        <th>CURSO</th>
                        <th>PROGRESSO</th>
                        <th>STATUS</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>

                <tbody id="listaAlunos">
                    <!-- alunos serão inseridos pelo main.js -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
