<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAC - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="iframe-body">
    <main class="content">
        <div class="header-flex">
            <div>
                <h1>Cadastro de Alunos</h1>
                <p>Gerencie os dados dos alunos e coordenadores</p>
            </div>

            <div style="display: flex; gap: 10px;">
                <button
                    class="btn-access"
                    onclick="window.location.href='cadastrar-aluno.html'"
                    style="width: auto;"
                >
                    <i class="fa-solid fa-user-plus"></i> Novo Aluno
                </button>

                <button
                    class="btn-access only-admin"
                    onclick="window.location.href='cadastrar-coordenador.html'"
                    style="width: auto;"
                >
                    <i class="fa-solid fa-user-tie"></i> Novo Coordenador
                </button>
            </div>
        </div>

        <div class="tabs-container">
            <span class="tab-item" id="tabCoordenadores">
                Coordenadores <small class="tab-count">3</small>
            </span>

            <span class="tab-item active" id="tabAlunos">
                Alunos <small class="tab-count">3</small>
            </span>
        </div>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input
                    type="text"
                    class="search-input"
                    placeholder="Buscar aluno..."
                >
            </div>

            <button class="btn-filter">
                <i class="fa-solid fa-sliders"></i> Filtros
            </button>
        </div>

        <section class="grid-alunos" id="listaAlunos"></section>

        <section
            class="grid-alunos"
            id="listaCoordenadores"
            style="display: none;"
        ></section>
    </main>

    <script src="main.js"></script>
</body>
</html>
