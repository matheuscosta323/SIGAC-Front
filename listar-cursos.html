<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAC - Gestão de Cursos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="iframe-body">
    <main class="content">

        <header class="top-bar" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Cursos</h1>
                <p>Gerencie os cursos oferecidos pela instituição.</p>
            </div>

            <button
                class="btn-access only-admin"
                onclick="window.location.href='cadastrar-curso.html'"
                style="margin: 0; width: auto; padding: 12px 25px;"
            >
                <i class="fa-solid fa-plus"></i> Novo Curso
            </button>
        </header>

        <section class="main-table" style="margin-top: 30px;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome do Curso</th>
                        <th>Carga Horária Total</th>
                        <th>Coordenador</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>01</td>
                        <td>Análise e Desenvolvimento de Sistemas</td>
                        <td>2.000h</td>
                        <td>Marcello Ramalho</td>
                        <td>
                            <button
                                title="Editar"
                                class="only-admin"
                                style="border:none; background:none; color:#0a2540; cursor:pointer;"
                            >
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>02</td>
                        <td>Design Gráfico</td>
                        <td>1.600h</td>
                        <td>Ludmilla Silva</td>
                        <td>
                            <button
                                title="Editar"
                                class="only-admin"
                                style="border:none; background:none; color:#0a2540; cursor:pointer;"
                            >
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <script src="main.js"></script>
</body>
</html>
