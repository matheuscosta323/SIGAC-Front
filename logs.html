<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Logs do Sistema - SIGAC</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">

    <style>
        .log-container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .log-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .log-item strong {
            color: #0a2540;
        }

        .log-date {
            font-size: 12px;
            color: #64748b;
        }

        .actions {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-clear {
            background: #ef4444;
            color: white;
        }

        .btn-clear:hover {
            background: #dc2626;
        }
    </style>
</head>

<body class="dashboard-body">

    <main class="content">

        <div class="log-container">

            <h2>📄 Logs do Sistema</h2>

            <div class="actions">
                <button class="btn btn-clear" id="limparLogs">
                    Limpar Logs
                </button>
            </div>

            <div id="listaLogs"></div>

        </div>

    </main>

    <script src="logs.js"></script>
</body>
</html>
